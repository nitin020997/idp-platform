# Phase 4 — the ExternalSecret: a *reference*, safe to live in (public) Git.
#
# ESO reads secret/whoami from Vault every refreshInterval and writes a native
# Kubernetes Secret named 'whoami-secret' into the demo namespace. No secret
# value is ever stored here — only the address of where to find it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: whoami
  namespace: demo
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: whoami-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: whoami
        property: password
    - secretKey: username
      remoteRef:
        key: whoami
        property: username
