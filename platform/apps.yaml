# The 'apps' Application — GitOps for your workloads.
#
# Mirrors the platform root app, but points at apps/ instead. Argo CD syncs
# anything you commit under apps/ into the cluster. This is how your actual
# services get deployed: git push, and they appear.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nitin020997/idp-platform.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
