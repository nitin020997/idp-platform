# Phase 3 — who signs certificates.
#
# A self-signed ClusterIssuer is enough for local TLS: cert-manager will mint
# certs on demand for any Ingress annotated with cert-manager.io/cluster-issuer.
# On a real cluster you'd swap this for a Let's Encrypt (ACME) issuer — the
# Ingress annotations stay identical, which is the whole point.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
