# Phase 5 — Loki + Promtail: logs, the third pillar.
#
# Promtail (a DaemonSet) ships every pod's logs to Loki; Grafana queries Loki
# as a datasource (wired in monitoring.yaml). Single-binary, filesystem storage
# — fine for local. Release name 'loki' => Service 'loki' on :3100.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: 2.10.3
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: false
        promtail:
          enabled: true
        grafana:
          enabled: false
        prometheus:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
