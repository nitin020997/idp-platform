# Phase 5 — an SLO as code.
#
# A recording rule computes whoami's 5m availability (non-5xx ratio) from
# ingress-nginx metrics; an alert fires when it drops below the 99% objective.
# Prometheus auto-discovers this rule (selectors are open in monitoring.yaml).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: whoami-slo
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: whoami.slo
      rules:
        - record: job:whoami_request_success:ratio_rate5m
          expr: |
            sum(rate(nginx_ingress_controller_requests{ingress="whoami",status!~"5.."}[5m]))
            /
            sum(rate(nginx_ingress_controller_requests{ingress="whoami"}[5m]))
        - alert: WhoamiAvailabilitySLOBreach
          expr: job:whoami_request_success:ratio_rate5m < 0.99
          for: 2m
          labels:
            severity: warning
            slo: whoami-availability
          annotations:
            summary: "whoami availability below 99% SLO"
            description: "5m success ratio is {{ $value | humanizePercentage }} (objective: 99%)."
