# Phase 5 — kube-prometheus-stack, right-sized for an 8GB laptop.
#
# Prometheus + Grafana only (Alertmanager, node-exporter and log aggregation
# dropped to fit 8GB RAM / 8 CPU). You still get metrics, dashboards,
# ServiceMonitor-based scraping and SLO rules — the observability core. On real
# or cloud hardware you'd re-enable the full set; the manifests are the same.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.2.3
    helm:
      values: |
        crds:
          enabled: true
        # not present on kind — skip to avoid permanently-firing "down" alerts
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false
        # trimmed to fit 8GB
        alertmanager:
          enabled: false
        nodeExporter:
          enabled: false
        prometheus:
          prometheusSpec:
            retention: 2h
            scrapeInterval: 60s
            evaluationInterval: 60s
            ruleSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            resources:
              requests:
                cpu: 100m
                memory: 350Mi
              limits:
                memory: 700Mi
        grafana:
          adminPassword: admin
          persistence:
            enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              memory: 250Mi
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: selfsigned
            hosts:
              - grafana.localhost
            tls:
              - hosts:
                  - grafana.localhost
                secretName: grafana-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
