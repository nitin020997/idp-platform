# Phase 4 — the ClusterSecretStore: how ESO talks to Vault.
#
# Cluster-scoped so any namespace can reference it. It authenticates to Vault
# with a token kept in the 'vault-token' Secret (created out-of-band, NOT in
# Git — it's a credential). In production you'd use Vault's Kubernetes auth
# method instead, so no static token exists at all.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "secret"        # the KV mount
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
